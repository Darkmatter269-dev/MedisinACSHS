<!DOCTYPE html>
<html lang="en">
<head>
<title>Plan and Schedule</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/feature-pages.css">
</head>
<body>
<a class="site-logo-link" href="home.html" aria-label="Go to home page">
    <img src="logoACSHS.png" alt="ACSHS logo" class="site-logo">
</a>
<main class="page-shell">
    <div class="top-bar">
        <a class="back-link" href="home.html">&larr; Back to Home</a>
        <span class="badge">Plan &amp; Schedule</span>
    </div>

    <section class="card medalendar-card" aria-label="Appointment scheduler">
        <h1 class="medalendar-title">MEDALENDAR.</h1>
        <p class="medalendar-subtitle">Schedule your medical intake here.</p>

        <form class="medalendar-form" action="#" method="post">
            <label for="full-name">PATIENT'S FULL NAME</label>
            <input id="full-name" name="full-name" type="text" placeholder="Juan dela Cruz" required>

            <label for="drug-name">NAME OF DRUGS</label>
            <select id="drug-name" name="drug-name" required>
                <option value="" disabled selected>Pumili ng gamot...</option>
                <option value="paracetamol">Paracetamol</option>
                <option value="ibuprofen">Ibuprofen</option>
                <option value="amoxicillin">Amoxicillin</option>
                <option value="cetirizine">Cetirizine</option>
                <option value="metformin">Metformin</option>
            </select>

            <div class="medalendar-time-grid">
                <div>
                    <label for="start-time">START TIME</label>
                    <input id="start-time" name="start-time" type="datetime-local" required>
                </div>
                <div>
                    <label for="end-time">END TIME</label>
                    <input id="end-time" name="end-time" type="datetime-local" required>
                </div>
            </div>

            <button type="submit" class="medalendar-submit">BOOK APPOINTMENT</button>
        </form>
    </section>
</main>
</body>
</html>
