<!DOCTYPE html>
<html lang="en">
<head>
<title>MedisinACSHS AI Assistant</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/ai-assistant.css">
</head>
<body>
<main class="assistant-page" aria-label="MedisinACSHS AI assistant page">
    <div class="assistant-window">
        <header class="assistant-header">
            <div class="assistant-branding">
                <a class="home-link" href="home.html" aria-label="Back to home">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m15 18-6-6 6-6"></path>
                    </svg>
                </a>
                <span class="assistant-avatar" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="9"></circle>
                        <path d="M8.8 13.3a3.4 3.4 0 0 0 6.4 0"></path>
                        <circle cx="9.2" cy="10.2" r="1"></circle>
                        <circle cx="14.8" cy="10.2" r="1"></circle>
                    </svg>
                </span>
                <div>
                    <h1>MedisinACSHS Assistant</h1>
                    <p class="status"><span class="status-dot"></span>Online - Ready to assist</p>
                </div>
            </div>

            <div class="assistant-actions" aria-label="Conversation controls">
                <button class="header-btn" type="button" title="Sound">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 5 6 9H3v6h3l5 4V5z"></path>
                        <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
                    </svg>
                </button>
                <button class="header-btn" type="button" title="Refresh">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
                        <path d="M21 4v6h-6"></path>
                    </svg>
                </button>
                <button class="header-btn" type="button" title="Close">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>
        </header>

        <section class="chat-shell" aria-label="Assistant messages">
            <article class="message message-assistant">
                <div class="message-head">
                    <span class="heart-icon" aria-hidden="true">&#9825;</span>
                    <strong>MedisinACSHS</strong>
                </div>
                <p>
                    Hi, I'm MedisinACSHS and I'm here to help with medical, technical, or emotional support.
                </p>
                <p>What can I do for you?</p>
                <time datetime="21:22">09:22 PM</time>
            </article>
        </section>

        <form class="chat-input" aria-label="Send a message">
            <button class="plus-btn" type="button" aria-label="Open extra options">+</button>
            <label class="sr-only" for="assistant-message">Type your message</label>
            <input id="assistant-message" type="text" placeholder="Type your message here...">
            <button class="send-btn" type="submit">Send</button>
        </form>

        <p class="footer-note">Powered by MedisinACSHS AI - For informational purposes only</p>
    </div>
</main>

<script>
const CHAT_API_URL = '/api/chat';

const SYSTEM_CONTEXT =
    `You are MedisinACSHS, a helpful AI medical assistant for the ACSHS.
Keep responses clear, concise, and compassionate.
If the user sends a greeting like hello, hi, or hey, reply with: Hello, how can I help you?`;

// ── DOM refs ─────────────────────────────────────────────────────
const chatForm   = document.querySelector('.chat-input');
const chatInput  = document.getElementById('assistant-message');
const chatShell  = document.querySelector('.chat-shell');
const sendBtn    = document.querySelector('.send-btn');

const conversationHistory = [];

// ── Helpers ──────────────────────────────────────────────────────
function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addUserMessage(text) {
    const article = document.createElement('article');
    article.className = 'message message-user';
    article.innerHTML = `<p></p><time>${getTime()}</time>`;
    article.querySelector('p').textContent = text;
    chatShell.appendChild(article);
    chatShell.scrollTop = chatShell.scrollHeight;
}

function addAssistantMessage(text) {
    const article = document.createElement('article');
    article.className = 'message message-assistant';
    article.innerHTML = `
        <div class="message-head">
            <span class="heart-icon" aria-hidden="true">&#9825;</span>
            <strong>MedisinACSHS</strong>
        </div>
        <p></p>
        <time>${getTime()}</time>`;
    article.querySelector('p').textContent = text;
    chatShell.appendChild(article);
    chatShell.scrollTop = chatShell.scrollHeight;
}

function showTyping() {
    const article = document.createElement('article');
    article.className = 'message message-assistant';
    article.id = 'typing-indicator';
    article.innerHTML = `
        <div class="message-head">
            <span class="heart-icon" aria-hidden="true">&#9825;</span>
            <strong>MedisinACSHS</strong>
        </div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <time>${getTime()}</time>`;
    chatShell.appendChild(article);
    chatShell.scrollTop = chatShell.scrollHeight;
}

function hideTyping() {
    const typing = document.getElementById('typing-indicator');
    if (typing) typing.remove();
}

async function sendToAssistant(userText) {
    conversationHistory.push({ role: 'user', parts: [{ text: userText }] });

    const response = await fetch(CHAT_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            system_instruction: { parts: [{ text: SYSTEM_CONTEXT }] },
            contents: conversationHistory
        })
    });

    const data = await response.json();

    if (!response.ok) {
        const detail = data?.error || data?.detail || `Server error ${response.status}`;
        throw new Error(typeof detail === 'string' ? detail : JSON.stringify(detail));
    }

    const replyText = data.reply || 'Sorry, I could not generate a response. Please try again.';
    conversationHistory.push({ role: 'model', parts: [{ text: replyText }] });
    return replyText;
}

// ── Send handler ─────────────────────────────────────────────────
async function handleSend(text) {
    const msg = text.trim();
    if (!msg) return;

    chatInput.value = '';
    chatInput.disabled = true;
    sendBtn.disabled = true;

    addUserMessage(msg);
    showTyping();

    try {
        const reply = await sendToAssistant(msg);
        hideTyping();
        addAssistantMessage(reply);
    } catch (err) {
        hideTyping();
        addAssistantMessage(`Sorry, something went wrong: ${err.message}`);
        console.error(err);
    } finally {
        chatInput.disabled = false;
        sendBtn.disabled = false;
        chatInput.focus();
    }
}

// ── Events ───────────────────────────────────────────────────────
chatForm.addEventListener('submit', (event) => {
    event.preventDefault();
    handleSend(chatInput.value);
});
</script>
</body>
</html>
